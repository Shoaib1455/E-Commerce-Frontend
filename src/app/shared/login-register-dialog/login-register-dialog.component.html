<div class="auth-dialog">
    <div class="dialog-header">
        <div>
            <span>ShopSphere account</span>
            <h3>{{ mode === 'login' ? 'Sign in to continue' : 'Create your account' }}</h3>
        </div>
        <button class="dialog-close" type="button" (click)="cancel()" aria-label="Close">&times;</button>
    </div>

    <div class="mode-switch">
        <button type="button" [class.active]="mode === 'login'" (click)="switchMode('login')">Sign in</button>
        <button type="button" [class.active]="mode === 'register'" (click)="switchMode('register')">Sign up</button>
    </div>

    <div class="dialog-body">
        <div class="dialog-form" *ngIf="mode === 'login'">
            <label>Email address</label>
            <input class="form-control" type="email" placeholder="you@example.com" [(ngModel)]="loginModel.email" />

            <label>Password</label>
            <input class="form-control" type="password" placeholder="Enter your password"
                [(ngModel)]="loginModel.Password" />
        </div>

        <div class="dialog-form" *ngIf="mode === 'register'">
            <label>Full name</label>
            <input class="form-control" type="text" placeholder="Your name" [(ngModel)]="registerModel.name" />

            <label>Email address</label>
            <input class="form-control" type="email" placeholder="you@example.com" [(ngModel)]="registerModel.email" />

            <label>Password</label>
            <input class="form-control" type="password" placeholder="Create a password"
                [(ngModel)]="registerModel.password" />
        </div>

        <div *ngIf="error" class="error">{{ error }}</div>
    </div>

    <div class="dialog-actions">
        <button class="ghost-action" type="button" (click)="cancel()">Cancel</button>
        <button class="theme-action" type="button" (click)="submit()" [disabled]="loading">
            {{ mode === 'login' ? 'Sign in' : 'Sign up' }}
        </button>
    </div>
</div>
