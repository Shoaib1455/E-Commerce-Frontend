<header class="store-header sticky-top">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
        <div class="container-xl">
            <a class="navbar-brand fw-bold" routerLink="/public">ShopSphere</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#storeNav"
                aria-controls="storeNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="storeNav">
                <ul class="navbar-nav mx-lg-auto gap-lg-2">
                    <li class="nav-item"><a class="nav-link active" routerLink="/public">Home</a></li>
                    <li class="nav-item"><a class="nav-link" routerLink="/public">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" routerLink="/public">Deals</a></li>
                    <li class="nav-item"><a class="nav-link" routerLink="/public">New Arrivals</a></li>
                </ul>

                <div class="header-actions d-flex align-items-center gap-2 mt-3 mt-lg-0">
                    <button class="btn btn-light icon-btn" type="button" (click)="toggleSearchBar()"
                        aria-label="Search products">
                        <nb-icon icon="search-outline"></nb-icon>
                    </button>
                    <a class="btn btn-light icon-btn position-relative" routerLink="/cart" aria-label="Shopping cart">
                        <nb-icon icon="shopping-cart-outline"></nb-icon>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            3
                        </span>
                    </a>
                    <a class="btn btn-dark px-3" routerLink="/Auth">Sign in</a>
                </div>
            </div>
        </div>
    </nav>

    <form class="search-strip border-bottom bg-white" *ngIf="isSearchBarVisible" (ngSubmit)="performSearch()">
        <div class="container-xl d-flex gap-2 py-3">
            <input class="form-control form-control-lg" type="search" placeholder="Search products, brands, categories"
                [(ngModel)]="searchQuery" name="search" autofocus>
            <button class="btn btn-danger px-4" type="submit">Search</button>
            <button class="btn btn-outline-secondary" type="button" (click)="closeSearchBar()">Close</button>
        </div>
    </form>
</header>

<main>
    <router-outlet></router-outlet>
</main>

<footer class="store-footer">
    <div class="container-xl d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <div class="fw-bold">ShopSphere</div>
            <small>Quality products, simple checkout, fast delivery.</small>
        </div>
        <div class="footer-links d-flex gap-3">
            <a routerLink="/public">Support</a>
            <a routerLink="/public">Shipping</a>
            <a routerLink="/public">Returns</a>
        </div>
    </div>
</footer>
